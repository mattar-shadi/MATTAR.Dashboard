name: Deploy Blazor WASM to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore "MATTAR.Dashboard.csproj"

      - name: Publish Blazor WASM
        run: |
          dotnet publish "MATTAR.Dashboard.csproj" -c Release -o publish \
            --no-restore \
            -p:BlazorEnableCompression=false \
            -p:BaseHref="/${{ github.event.repository.name }}/"

      - name: Prepare files for GitHub Pages (flatten + 404 + .nojekyll)
        run: |
          mkdir -p deploy

          # Copie tout le contenu de wwwroot (et flatten si sous-dossier existe)
          if [ -d "publish/wwwroot" ]; then
            cp -r publish/wwwroot/* deploy/ 2>/dev/null || true
          fi

          # Si un sous-dossier du nom du projet s'est glissé, on le remonte
          if [ -d "deploy/MATTAR.Dashboard" ]; then
            cp -r deploy/MATTAR.Dashboard/* deploy/ 2>/dev/null || true
            rm -rf deploy/MATTAR.Dashboard
          fi

          # Fichiers obligatoires pour SPA + GitHub Pages
          cp deploy/index.html deploy/404.html 2>/dev/null || true
          touch deploy/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
          publish_branch: gh-pages