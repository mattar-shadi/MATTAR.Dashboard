<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MATTAR Dashboard</title>
  <script>
    (function (l) {
      if (l.pathname.slice(1)) {
        var s = l.pathname.slice(1).split('/');
        var repo = s[0];
        var path = s.slice(1).join('/');
        var query = l.search.slice(1);
        var hash = l.hash;
        var redirect = l.origin + '/' + repo + '/?p=' + encodeURIComponent(path) + (query ? '&q=' + encodeURIComponent(query.replace(/&/g, '~and~')) : '') + hash;
        window.location.replace(redirect);
      }
    }(window.location));
  </script>
</head>
<body>
</body>
</html>
